format = """\
$os\
$directory\
$git_branch \
$git_commit\
$git_state\
$git_status\
$dotnet\
$fill\
$cmd_duration \
$docker_context \
$azure \
$time\
$line_break\
$character"""

add_newline = true

[line_break]
disabled = false

[fill]
symbol = " "

[os]
format = "[($version $symbol )]($style)"
style = "bold white"
disabled = true

[os.symbols]
Ubuntu = ""
Windows = ""

[directory]
disabled = false
home_symbol = '󰋜 ~'
format = '[$path]($style)[$read_only]($read_only_style) '
read_only_style = '197'
read_only = '  '
truncate_to_repo = true
truncation_symbol = "…/"
repo_root_style = "bold yellow"
use_os_path_sep = false

[time]
disabled = false
time_format = "%T"           # Hour:Minute Format
format = '[󱑍 $time]($style)'

[cmd_duration]
format = 'last command: [$duration](bold yellow)'

[git_branch]
disabled = false
symbol = " "
only_attached = true
always_show_remote = false
style = "purple bold"
format = "[$symbol$branch(:$remote_branch)]($style)"

[git_commit]
disabled = false
format = '[\($hash$tag\)]($style)'
#commit_hash_length = 4
tag_disabled = false
only_detached = true

[git_status]
format = '([\( $all_status$ahead_behind \)]($style) )'
style = 'bold green'
conflicted = '[ confliced=${count}](red) '
up_to_date = '[󰘽](green)'
untracked = '[${count}](red) '
ahead = '⇡${count}'
diverged = '⇡${ahead_count} ⇣${behind_count}'
behind = '⇣ behind=${count}'
stashed = '[ stashed=${count}](green) '
modified = '[${count}](yellow) '
staged = '[󰐗 staged=${count}](green) '
renamed = '[󱍸 renamed=${count}](yellow) '
deleted = '[󰍶 deleted=${count}](red) '

