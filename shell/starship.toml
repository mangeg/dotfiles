# renamed = '襁 '
# deleted = ' '

[memory_usage]
symbol = "󰍛 "
disabled = true
style = 'bold dimmed white'
threshold = 1
format = "$symbol [${ram}(|${swap})]($style) "

[docker_context]
symbol = " "

[dotnet]
symbol = " "
format = "[$symbol($version)]($style)"
style = 'blue bold'
heuristic = false
disabled = true

[azure]
disabled = false
format = '[$symbol($subscription)]($style) '
symbol = '󰠅 '
style = 'blue bold'